<body>
    <section class="body__wrapper layout__container">
        <section class="todo__main">
            <form id="todoForm" action="" method="post" class="todo__form">
                <input id="newTask" type="text" name="newTask" class="todo__input" placeholder="Add new task" required autocomplete="off">
                <button id="todoAdd" class="cta__add" data-title="Add new task" type="submit">Add</button>
            </form>
            <form id="todoList" action="" method="post" class="todo__box todo__box--todo flex flex--column"></form>
            <div id="doneList" class="todo__box todo__box--done flex flex--column"></div>
        </section>
    </section>

    <section class="auth__popup auth-login" id="logInPopup">
        <div class="layout__container">
            <a class="icon-close" id="loginPopupClose" href="#">X</a>
            <div class="grid auth__inner">
                <form action="" method="get">
                    <label class="label_customer-email">
                        <span>E-mail</span>
                        <input placeholder="Enter your email" type="email" autocomplete="e-mail" name="email" id="loginEmail" required>
                    </label>
                    <label class="label_customer-name">
                        <span>Password</span>
                        <input placeholder="Enter your password" type="password" autocomplete="current-password" name="password" id="loginPass" required>
                    </label>
                    <button id="logInCta" data-title="Log in" type="submit">Log in</button>
                </form>
                <div class="form__after">
                    <h2>Not a member?</h2>
                    <a class="userSignIn" href="">Sign in</a>
                </div>
            </div>
        </div>
    </section>

    <section class="auth__popup auth-sign" id="signInPopup">
        <div class="layout__container">
            <a class="icon-close" id="signInPopupClose" href="#">X</a>
            <div class="grid auth__inner">
                <form action="" method="get" autocomplete="off">
                    <label class="label_customer-name">
                        <span>Name</span>
                        <input type="text" name="username" autocomplete="new-username" id="signInUser" required>
                    </label>
                    <label class="label_customer-email">
                        <span>E-mail</span>
                        <input type="email" autocomplete="e-mail" name="new-email" id="signInEmail" required>
                    </label>
                    <label class="label_customer-name">
                        <span>Password</span>
                        <input type="password" autocomplete="off" name="new-password" id="signInPass" required>
                    </label>
                    <button id="signInCta" data-title="Sign in" type="submit">Sign in</button>
                </form>
                <div class="form__after">
                    <h2>Already a member?</h2>
                    <a class="userLogin" href="">login</a>
                </div>
            </div>
        </div>
    </section>
    
    <script type="module" src="./src/js/main.js"></script>
</body>

</html>
